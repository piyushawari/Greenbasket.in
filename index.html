<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GreenBasket — Eco-Product Store</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  /* ===== RESET & TOKENS ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --c-primary: #2d7a3a;
    --c-primary-dark: #1e5528;
    --c-primary-light: #e8f5eb;
    --c-dark: #1a2e1c;
    --c-accent: #72b87a;
    --c-lime: #a8d5ae;
    --c-gold: #f0b429;
    --c-surface: #f4f7f4;
    --c-card: #ffffff;
    --c-text: #1a2e1c;
    --c-muted: #637568;
    --c-border: #dae8db;
    --c-hero-from: #1a2e1c;
    --c-hero-to: #2d5c32;
    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --shadow-sm: 0 2px 8px rgba(0,0,0,.06);
    --shadow-md: 0 6px 24px rgba(0,0,0,.09);
    --shadow-lg: 0 16px 48px rgba(0,0,0,.13);
    --transition: .25s cubic-bezier(.4,0,.2,1);
    --font-display: 'Syne', sans-serif;
    --font-body: 'Plus Jakarta Sans', sans-serif;
  }
  [data-theme="dark"] {
    --c-surface: #0f1a10;
    --c-card: #182019;
    --c-text: #e2ede4;
    --c-muted: #7fa882;
    --c-border: #253527;
    --c-primary-light: #1a3320;
    --c-hero-from: #090f0a;
    --c-hero-to: #142416;
  }
  html { scroll-behavior: smooth; font-size: 16px; }
  body {
    background: var(--c-surface);
    color: var(--c-text);
    font-family: var(--font-body);
    min-height: 100vh;
    transition: background var(--transition), color var(--transition);
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--c-surface); }
  ::-webkit-scrollbar-thumb { background: var(--c-accent); border-radius: 3px; }

  /* ===== NAVBAR ===== */
  #navbar {
    position: sticky; top: 0; z-index: 1000;
    background: #ffffff;
    border-bottom: 1px solid #e8ede8;
    padding: 0 2rem;
    height: 64px;
    display: flex; align-items: center; gap: 1.25rem;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    transition: all var(--transition);
  }
  [data-theme="dark"] #navbar {
    background: #182019;
    border-bottom-color: #253527;
    box-shadow: 0 1px 4px rgba(0,0,0,.2);
  }
  .nav-logo {
    font-family: var(--font-display);
    font-size: 1.4rem; font-weight: 800;
    color: var(--c-text); letter-spacing: -.02em;
    white-space: nowrap; flex-shrink: 0; cursor: pointer;
    display: flex; align-items: center; gap: .45rem;
  }
  .nav-logo-icon {
    width: 30px; height: 30px;
    background: var(--c-primary);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: .9rem;
  }
  .nav-logo span { color: var(--c-primary); }
  .nav-search {
    flex: 1; max-width: 440px; position: relative;
  }
  .nav-search input {
    width: 100%;
    padding: .55rem 1rem .55rem 2.6rem;
    background: #f0f4f0;
    border: 1.5px solid #dde8dd;
    border-radius: 999px;
    color: var(--c-text); font-family: var(--font-body);
    font-size: .88rem; outline: none;
    transition: background var(--transition), border var(--transition);
  }
  [data-theme="dark"] .nav-search input { background: #1f2e20; border-color: #2e4030; color: #e2ede4; }
  .nav-search input::placeholder { color: #9ab09c; }
  .nav-search input:focus { background: #e8f0e8; border-color: var(--c-primary); }
  [data-theme="dark"] .nav-search input:focus { background: #253527; }
  .nav-search-icon {
    position: absolute; left: .85rem; top: 50%; transform: translateY(-50%);
    color: #9ab09c; font-size: .9rem; pointer-events: none;
  }
  .nav-actions { margin-left: auto; display: flex; align-items: center; gap: .55rem; }
  .btn-icon {
    background: transparent;
    border: 1.5px solid #dde8dd;
    color: var(--c-text); border-radius: 50%;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1rem;
    transition: background var(--transition), transform var(--transition), border-color var(--transition);
    position: relative;
  }
  [data-theme="dark"] .btn-icon { border-color: #2e4030; }
  .btn-icon:hover { background: var(--c-primary-light); border-color: var(--c-primary); transform: scale(1.05); }
  .cart-badge {
    position: absolute; top: -5px; right: -5px;
    background: var(--c-primary); color: #fff;
    font-family: var(--font-body); font-size: .58rem; font-weight: 800;
    width: 18px; height: 18px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
    border: 2px solid #fff;
  }
  [data-theme="dark"] .cart-badge { border-color: #182019; }
  .cart-badge.visible { display: flex; }

  /* ===== HERO ===== */
  #hero {
    background: #e8f5e9;
    min-height: 500px;
    display: flex; align-items: stretch;
    position: relative; overflow: hidden;
    padding: 0;
  }
  [data-theme="dark"] #hero { background: #0f1f11; }
  .hero-left {
    flex: 0 0 55%; max-width: 55%;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 4rem 3rem 4rem 4rem;
  }
  .hero-right {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 2.5rem 3rem 2.5rem 1rem;
    position: relative;
  }
  .hero-tag {
    display: inline-flex; align-items: center; gap: .4rem;
    background: rgba(45,122,58,.1); border: 1px solid rgba(45,122,58,.2);
    color: var(--c-primary); border-radius: 999px;
    padding: .32rem .9rem; font-size: .72rem; letter-spacing: .06em; text-transform: uppercase;
    margin-bottom: 1.4rem; font-weight: 700; width: fit-content;
    opacity: 0; animation: fadeUp .5s .05s forwards;
  }
  [data-theme="dark"] .hero-tag { background: rgba(45,122,58,.15); border-color: rgba(45,122,58,.3); }
  .hero-h1 {
    font-family: var(--font-display);
    font-size: clamp(2.5rem, 4.5vw, 3.8rem);
    color: #0d2110; font-weight: 800;
    line-height: 1.1; max-width: 560px;
    margin-bottom: 1.2rem;
    opacity: 0; animation: fadeUp .5s .18s forwards;
    letter-spacing: -.02em;
  }
  [data-theme="dark"] .hero-h1 { color: #e2ede4; }
  .hero-h1 em { color: var(--c-primary); font-style: normal; }
  .hero-sub {
    color: #4a6b50; font-size: .97rem;
    max-width: 480px; line-height: 1.75;
    margin-bottom: 2.25rem;
    opacity: 0; animation: fadeUp .5s .3s forwards;
  }
  [data-theme="dark"] .hero-sub { color: #7fa882; }
  .hero-btns {
    display: flex; gap: .85rem; flex-wrap: wrap; align-items: center;
    opacity: 0; animation: fadeUp .5s .44s forwards;
    margin-bottom: 2.5rem;
  }
  .hero-cta-primary {
    display: inline-flex; align-items: center; gap: .5rem;
    background: var(--c-primary); color: #fff;
    font-family: var(--font-body); font-weight: 700; font-size: .9rem;
    padding: .82rem 1.8rem; border-radius: 999px;
    cursor: pointer; border: none;
    transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
  }
  .hero-cta-primary:hover { background: var(--c-primary-dark); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(45,122,58,.3); }
  .hero-cta-secondary {
    display: inline-flex; align-items: center; gap: .5rem;
    background: transparent; color: var(--c-text);
    font-family: var(--font-body); font-weight: 600; font-size: .9rem;
    padding: .82rem 1.8rem; border-radius: 999px;
    cursor: pointer; border: 1.5px solid #b8d4ba;
    transition: all var(--transition);
  }
  .hero-cta-secondary:hover { background: rgba(45,122,58,.08); border-color: var(--c-primary); }
  .hero-stats {
    display: flex; align-items: center; gap: 0;
    opacity: 0; animation: fadeUp .5s .56s forwards;
  }
  .hero-stat {
    display: flex; flex-direction: column;
    padding-right: 1.5rem;
    margin-right: 1.5rem;
    border-right: 1.5px solid #b8d4ba;
  }
  [data-theme="dark"] .hero-stat { border-right-color: #2a3d2b; }
  .hero-stat:last-child { border-right: none; padding-right: 0; margin-right: 0; }
  .hero-stat-n { font-family: var(--font-display); font-size: 1.55rem; font-weight: 800; color: var(--c-primary); line-height: 1; }
  .hero-stat-l { font-size: .7rem; color: #6b9470; margin-top: .2rem; font-weight: 500; }
  [data-theme="dark"] .hero-stat-l { color: #7fa882; }

  /* Hero illustration cards */
  .hero-cards {
    display: flex; flex-direction: column; gap: 1rem;
    position: relative; width: 100%; max-width: 320px;
  }
  .hero-card-row { display: flex; gap: 1rem; align-items: flex-start; }
  .hero-card-row:nth-child(2) { padding-left: 2.5rem; }
  .hero-illus-card {
    background: #fff; border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,.08);
    overflow: hidden;
    flex: 1;
    animation: heroFloat 0s both;
    border: 1.5px solid rgba(255,255,255,.8);
  }
  [data-theme="dark"] .hero-illus-card { background: #1e2f1f; border-color: #2a3d2b; }
  .hero-illus-card:nth-child(1) { animation: heroFloatA 4s ease-in-out infinite; }
  .hero-illus-card:nth-child(2) { animation: heroFloatB 4.5s ease-in-out infinite .4s; }
  .hero-illus-card-img {
    width: 100%; aspect-ratio: 1;
    object-fit: cover;
    display: block;
    background: #d4ebd6;
  }
  .hero-illus-card-body {
    padding: .6rem .75rem;
  }
  .hero-illus-card-label { font-size: .65rem; font-weight: 700; color: var(--c-primary); text-transform: uppercase; letter-spacing: .06em; }
  .hero-illus-card-name { font-size: .78rem; font-weight: 700; color: var(--c-text); margin-top: .1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hero-illus-card-price { font-size: .78rem; font-weight: 800; color: var(--c-primary); font-family: var(--font-display); margin-top: .15rem; }
  .hero-rating-card {
    background: #fffbf0;
    border-radius: 20px;
    padding: 1rem 1.25rem;
    box-shadow: 0 4px 20px rgba(0,0,0,.08);
    border: 1.5px solid #fde8a0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: .2rem; flex: 0 0 auto; width: 90px;
    animation: heroFloatB 5s ease-in-out infinite .8s;
  }
  [data-theme="dark"] .hero-rating-card { background: #2a2410; border-color: #4a3c10; }
  .hero-rating-diamond {
    width: 52px; height: 52px;
    background: var(--c-gold);
    border-radius: 10px;
    transform: rotate(45deg);
    display: flex; align-items: center; justify-content: center;
    margin: .25rem auto;
    box-shadow: 0 3px 10px rgba(240,180,41,.35);
  }
  .hero-rating-diamond span {
    transform: rotate(-45deg);
    font-family: var(--font-display);
    font-size: 1.1rem; font-weight: 800; color: #3a2800;
  }
  .hero-rating-label { font-size: .62rem; font-weight: 700; color: #9a7000; text-transform: uppercase; letter-spacing: .05em; }

  @keyframes heroFloatA {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-7px); }
  }
  @keyframes heroFloatB {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 900px) {
    #hero { flex-direction: column; }
    .hero-left { flex: none; max-width: 100%; padding: 3rem 1.5rem 1.5rem; }
    .hero-right { display: none; }
  }

  /* ===== TABS ===== */
  #tab-bar {
    max-width: 1400px; margin: 0 auto;
    padding: 1.75rem 2rem 0;
    display: flex; align-items: center; gap: .5rem;
  }
  .tab-btn {
    padding: .55rem 1.35rem;
    background: none;
    border: 1.5px solid var(--c-border);
    border-radius: 999px;
    font-family: var(--font-body); font-size: .87rem; font-weight: 600;
    color: var(--c-muted); cursor: pointer;
    transition: all var(--transition);
    display: flex; align-items: center; gap: .4rem;
  }
  .tab-btn:hover { border-color: var(--c-primary); color: var(--c-primary); }
  .tab-btn.active {
    background: var(--c-primary); color: #fff;
    border-color: var(--c-primary);
  }

  /* ===== LAYOUT SHELL ===== */
  #main-shell {
    display: flex; gap: 0;
    max-width: 1400px; margin: 0 auto;
    padding: 2rem 2rem 2.5rem;
    align-items: flex-start;
  }

  /* ===== SIDEBAR FILTERS ===== */
  #sidebar {
    width: 256px; flex-shrink: 0;
    position: sticky; top: 82px;
    background: var(--c-card);
    border: 1.5px solid var(--c-border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-right: 1.75rem;
    transition: background var(--transition), border var(--transition);
  }
  .filter-title {
    font-family: var(--font-display);
    font-size: 1rem; font-weight: 700;
    color: var(--c-text); margin-bottom: 1.25rem;
    display: flex; align-items: center; gap: .5rem;
  }
  .filter-section { margin-bottom: 1.35rem; }
  .filter-label {
    font-size: .7rem; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--c-muted);
    margin-bottom: .6rem; display: block;
  }
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px;
    background: linear-gradient(to right, var(--c-primary) 0%, var(--c-primary) var(--pct,50%), var(--c-border) var(--pct,50%));
    border-radius: 2px; cursor: pointer; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 17px; height: 17px;
    background: var(--c-primary); border-radius: 50%;
    border: 3px solid var(--c-card);
    box-shadow: 0 2px 6px rgba(0,0,0,.18);
    transition: transform .15s;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  .range-val { font-size: .8rem; font-weight: 700; color: var(--c-primary); margin-top: .3rem; display: block; text-align: right; }
  .cb-group { display: flex; flex-direction: column; gap: .42rem; }
  .cb-item { display: flex; align-items: center; gap: .5rem; cursor: pointer; }
  .cb-item input { accent-color: var(--c-primary); width: 15px; height: 15px; cursor: pointer; }
  .cb-item span { font-size: .83rem; color: var(--c-text); text-transform: capitalize; }
  select.filter-select {
    width: 100%; padding: .5rem .75rem;
    background: var(--c-surface); color: var(--c-text);
    border: 1.5px solid var(--c-border); border-radius: var(--radius-sm);
    font-family: var(--font-body); font-size: .85rem; outline: none; cursor: pointer;
    transition: border var(--transition);
  }
  select.filter-select:focus { border-color: var(--c-primary); }
  .btn-reset {
    width: 100%; padding: .6rem;
    background: none; border: 1.5px solid var(--c-border);
    border-radius: var(--radius-sm); font-family: var(--font-body);
    color: var(--c-muted); font-size: .83rem; cursor: pointer;
    transition: all var(--transition); margin-top: .25rem;
  }
  .btn-reset:hover { border-color: var(--c-primary); color: var(--c-primary); }
  .eco-rating-filter { display: flex; gap: .45rem; flex-wrap: wrap; }
  .eco-rating-btn {
    padding: .3rem .7rem;
    border: 1.5px solid var(--c-border); border-radius: 999px;
    background: none; font-family: var(--font-body);
    font-size: .78rem; font-weight: 700; cursor: pointer;
    color: var(--c-muted); transition: all var(--transition);
  }
  .eco-rating-btn.active { background: var(--c-primary); color: #fff; border-color: var(--c-primary); }

  /* Mobile filter */
  #filter-toggle-bar {
    display: none;
    background: var(--c-card);
    border: 1.5px solid var(--c-border);
    border-radius: var(--radius-md);
    padding: .75rem 1.25rem;
    margin-bottom: .75rem;
    cursor: pointer;
    align-items: center; justify-content: space-between;
    font-size: .88rem; font-weight: 700; color: var(--c-text);
  }
  #mobile-filters {
    display: none;
    background: var(--c-card);
    border: 1.5px solid var(--c-border);
    border-radius: var(--radius-md);
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }
  #mobile-filters.open { display: block; }

  /* ===== CONTENT AREA ===== */
  #content-area { flex: 1; min-width: 0; }

  /* ===== FEATURED SLIDER ===== */
  #featured-section { margin-bottom: 2.25rem; }
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 1rem;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: 1.25rem; font-weight: 700; color: var(--c-text);
  }
  .slider-wrap { position: relative; overflow: hidden; border-radius: var(--radius-lg); }
  .slider-track { display: flex; transition: transform .5s cubic-bezier(.4,0,.2,1); }
  .slider-card {
    flex: 0 0 calc(20% - 12px); margin-right: 15px;
    background: var(--c-card); border: 1.5px solid var(--c-border);
    border-radius: var(--radius-md); overflow: hidden; cursor: pointer;
    transition: transform var(--transition), box-shadow var(--transition);
  }
  .slider-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
  .slider-card-img { width: 100%; height: 130px; object-fit: cover; background: var(--c-primary-light); display: block; }
  .slider-card-body { padding: .7rem .8rem; }
  .slider-card-name { font-size: .78rem; font-weight: 700; color: var(--c-text); margin-bottom: .2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .slider-card-price { font-size: .76rem; color: var(--c-primary); font-weight: 700; }
  .slider-arrows { display: flex; gap: .45rem; align-items: center; }
  .slider-btn {
    background: var(--c-card); border: 1.5px solid var(--c-border);
    border-radius: 50%; width: 33px; height: 33px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: .85rem; color: var(--c-text);
    transition: all var(--transition);
  }
  .slider-btn:hover { background: var(--c-primary); color: #fff; border-color: var(--c-primary); }

  /* ===== STATS BAR ===== */
  #stats-bar {
    display: grid; grid-template-columns: repeat(3,1fr); gap: .85rem;
    margin-bottom: 1.75rem;
  }
  .stat-card {
    background: var(--c-card); border: 1.5px solid var(--c-border);
    border-radius: var(--radius-md); padding: 1rem 1.2rem;
    transition: background var(--transition);
  }
  .stat-n { font-family: var(--font-display); font-size: 1.65rem; font-weight: 800; color: var(--c-primary); line-height: 1; }
  .stat-l { font-size: .72rem; color: var(--c-muted); margin-top: .25rem; }

  /* ===== PRODUCTS GRID ===== */
  #products-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 1.1rem;
    margin-bottom: 1.75rem;
  }

  /* ===== PRODUCT CARD ===== */
  .prod-card {
    background: var(--c-card);
    border: 1.5px solid var(--c-border);
    border-radius: var(--radius-md);
    overflow: hidden; cursor: pointer;
    transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    position: relative;
    animation: cardIn .38s both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .prod-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); border-color: var(--c-accent); }
  .prod-img-wrap { position: relative; overflow: hidden; height: 195px; background: var(--c-primary-light); }
  .prod-img { width: 100%; height: 100%; object-fit: cover; transition: transform .42s ease; display: block; }
  .prod-card:hover .prod-img { transform: scale(1.07); }
  .prod-img-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: .4rem; color: var(--c-muted); font-size: .8rem;
    background: var(--c-primary-light);
  }
  .prod-img-placeholder span:first-child { font-size: 2.5rem; }
  .eco-badge {
    position: absolute; top: .65rem; left: .65rem;
    background: var(--c-primary); color: #fff;
    font-size: .62rem; font-weight: 800; letter-spacing: .06em;
    padding: .22rem .6rem; border-radius: 999px;
  }
  .eco-badge.silver { background: #78909c; }
  .top-pick-badge {
    position: absolute; top: .65rem; right: .65rem;
    background: linear-gradient(135deg, #ffd700, #ffa000);
    color: #3a2800; font-size: .58rem; font-weight: 800;
    padding: .2rem .5rem; border-radius: 999px;
    text-transform: uppercase; letter-spacing: .05em;
  }
  .co2-bar-wrap { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(0,0,0,.07); }
  .co2-bar { height: 100%; background: linear-gradient(to right, #4CAF50, #8BC34A); }
  .prod-body { padding: .85rem 1rem 1rem; }

function loadCart() {
  try { const s = localStorage.getItem('gb_cart'); if (s) cart = JSON.parse(s); } catch(e) {}
}

function saveCart() {
  try { localStorage.setItem('gb_cart', JSON.stringify(cart)); } catch(e) {}
}

function addToCart(productId, e) {
  if (e) { e.stopPropagation(); }
  const p = PRODUCTS.find(x => x.id === productId);
  if (!p) return;
  const existing = cart.find(c => c.id === productId);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({ ...p, qty: 1 });
  }
  saveCart();
  updateCartBadge();
  renderCartItems();
  showToast(`🛒 ${p.name} added to cart!`);

  // Flash the add button
  const btn = document.querySelector(`[data-cart-id="${productId}"]`);
  if (btn) {
    btn.textContent = '✓ Added';
    btn.classList.add('added');
    setTimeout(() => { btn.innerHTML = '+ Add'; btn.classList.remove('added'); }, 1500);
  }
}

function removeFromCart(productId) {
  cart = cart.filter(c => c.id !== productId);
  saveCart();
  updateCartBadge();
  renderCartItems();
}

function changeQty(productId, delta) {
  const item = cart.find(c => c.id === productId);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) { removeFromCart(productId); return; }
  saveCart();
  renderCartItems();
}

function clearCart() {
  cart = [];
  saveCart();
  updateCartBadge();
  renderCartItems();
  showToast('🗑️ Cart cleared');
}

function updateCartBadge() {
  const total = cart.reduce((s, c) => s + c.qty, 0);
  const badge = document.getElementById('cart-badge');
  if (!badge) return;
  if (total > 0) {
    badge.textContent = total > 99 ? '99+' : total;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

function openCart() {
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
  renderCartItems();
}

function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-panel').classList.remove('open');
  document.body.style.overflow = '';
}

function renderCartItems() {
  const list = document.getElementById('cart-items-list');
  const footer = document.getElementById('cart-footer');
  const summary = document.getElementById('cart-summary');
  const countEl = document.getElementById('cart-item-count');
  if (!list) return;

  const totalItems = cart.reduce((s, c) => s + c.qty, 0);
  if (countEl) countEl.textContent = `${totalItems} item${totalItems !== 1 ? 's' : ''}`;

  if (cart.length === 0) {
    list.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛒</div><p>Your cart is empty.<br>Start shopping for eco-friendly products!</p></div>`;
    if (footer) footer.style.display = 'none';
    return;
  }

  list.innerHTML = cart.map(item => `
    <div class="cart-item">
      <img class="cart-item-img" src="${item.img}" alt="${item.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\'><rect width=\\'68\\' height=\\'68\\' fill=\\'%23e8f5eb\\'/></svg>'">
      <div class="cart-item-info">
        <div class="cart-item-cat">${item.category}</div>
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">₹${(item.price * item.qty).toLocaleString('en-IN')}</div>
        <div class="cart-item-actions">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span class="qty-val">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
          <button class="cart-item-remove" onclick="removeFromCart(${item.id})" title="Remove">🗑</button>
        </div>
      </div>
    </div>`).join('');

  const subtotal = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const shipping = subtotal > 999 ? 0 : 49;
  const total = subtotal + shipping;
  if (summary) {
    summary.innerHTML = `
      <div class="cart-summary-row"><span>Subtotal</span><span>₹${subtotal.toLocaleString('en-IN')}</span></div>
      <div class="cart-summary-row"><span>Shipping</span><span>${shipping === 0 ? '🎉 Free' : '₹' + shipping}</span></div>
      <div class="cart-summary-row total"><span>Total</span><span>₹${total.toLocaleString('en-IN')}</span></div>`;
  }
  if (footer) footer.style.display = 'block';
}

      <div>
        <div class="footer-brand">Green<span>Basket</span> 🌿</div>
        <p class="footer-p">We curate India's finest eco-friendly products — each verified for low carbon footprint, sustainable sourcing, and circular design. Shopping green has never felt this good.</p>
      </div>
      <div>
        <div class="footer-col-title">Explore</div>
        <ul class="footer-links">
          <li onclick="onCategoryChange({value:'All'});applyFilters()">All Products</li>
          <li onclick="onCategoryChange({value:'Personal Care'});applyFilters()">Personal Care</li>
          <li onclick="onCategoryChange({value:'Kitchen'});applyFilters()">Kitchen</li>
          <li onclick="onCategoryChange({value:'Fashion'});applyFilters()">Fashion</li>
          <li onclick="onCategoryChange({value:'Home'});applyFilters()">Home</li>
        </ul>
      </div>
      <div>
        <div class="footer-col-title">Company</div>
        <ul class="footer-links">
          <li>About Us</li><li>Sustainability Mission</li><li>Carbon Offset Program</li><li>Contact</li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      <span>© 2025 GreenBasket. Made with 🌿 for the planet.</span>
      <span>All products eco-verified.</span>
    </div>
  </footer>`;
}

/* ===================== TAB SWITCHING ===================== */
function switchTab(tab) {
  filters.tab = tab;
  const allBtn = document.getElementById('tab-all');
  const topBtn = document.getElementById('tab-top');
  const label = document.getElementById('section-title-label');
  if (allBtn) allBtn.classList.toggle('active', tab === 'all');
  if (topBtn) topBtn.classList.toggle('active', tab === 'top');
  if (label) label.textContent = tab === 'top' ? '⭐ Top Picks' : 'All Products';
  applyFilters();
}

/* ===================== RENDER ===================== */
function renderProducts(append = false) {
  const grid = document.getElementById('products-grid');
  const noRes = document.getElementById('no-results');
  if (!grid) return;
  if (!append) { grid.innerHTML = ''; displayedCount = 0; }
  if (filteredProducts.length === 0) {
    noRes.style.display = 'block';
    grid.innerHTML = '';
    updateStats();
    return;
  }
  noRes.style.display = 'none';
  const slice = filteredProducts.slice(displayedCount, displayedCount + PAGE_SIZE);
  slice.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'prod-card';
    card.style.animationDelay = `${i * 0.055}s`;
    const badgeClass = p.rating === 'B' ? 'eco-badge silver' : 'eco-badge';
    const co2Pct = Math.min((p.co2 / 5) * 100, 100);
    const co2Color = p.co2 < 1 ? '#4CAF50' : p.co2 < 2.5 ? '#8BC34A' : '#FF9800';
    card.innerHTML = `
      <div class="prod-img-wrap">
        <img class="prod-img" src="${p.img}" alt="${p.name}" loading="lazy"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="prod-img-placeholder" style="display:none"><span>🌿</span><span>Eco Product</span></div>
        <div class="${badgeClass}">${p.rating === 'A+' ? '🌿 A+' : p.rating}</div>
        ${p.topPick ? '<div class="top-pick-badge">⭐ Top Pick</div>' : ''}
        <div class="co2-bar-wrap"><div class="co2-bar" style="width:${co2Pct}%;background:${co2Color}"></div></div>
      </div>
      <div class="prod-body">
        <div class="prod-cat">${p.category} • ${p.material.charAt(0).toUpperCase()+p.material.slice(1)}</div>
        <div class="prod-name">${p.name}</div>
        <div class="prod-footer">
          <div>
            <div class="prod-price">₹${p.price.toLocaleString('en-IN')}</div>
            <div class="prod-co2">🌱 ${p.co2} kg CO₂</div>
          </div>
          <button class="btn-add-cart" data-cart-id="${p.id}" onclick="addToCart(${p.id},event)">+ Add</button>
        </div>
      </div>`;
    card.addEventListener('click', (e) => { if (!e.target.closest('.btn-add-cart')) openModal(p.id); });
    grid.appendChild(card);
  });
  displayedCount += slice.length;
  updateStats();
  updateHeroCo2();
}

function updateStats() {
  const bar = document.getElementById('stats-bar');
  if (!bar) return;
  const shown = filteredProducts.slice(0, Math.max(displayedCount, 1));
  const avgCo2 = shown.length ? (shown.reduce((a,b) => a+b.co2,0)/shown.length).toFixed(2) : '0';
  const saved = shown.length ? (shown.reduce((a,b) => a+(3-b.co2 < 0 ? 0 : 3-b.co2),0)).toFixed(1) : '0';
  bar.innerHTML = `
    <div class="stat-card"><div class="stat-n">${filteredProducts.length}</div><div class="stat-l">Matching Products</div></div>
    <div class="stat-card"><div class="stat-n">${avgCo2} kg</div><div class="stat-l">Avg CO₂ Impact</div></div>
    <div class="stat-card"><div class="stat-n">${saved} kg</div><div class="stat-l">Est. CO₂ Saved vs Conventional</div></div>`;
}

function updateHeroCo2() {
  const el = document.getElementById('hero-avg-co2');
  if (!el) return;
  const avg = (PRODUCTS.reduce((a,b) => a+b.co2,0)/PRODUCTS.length).toFixed(1);
  el.textContent = avg + 'kg';
}

/* ===================== FILTERS ===================== */
function applyFilters() {
  let base = PRODUCTS;
  // Tab filter
  if (filters.tab === 'top') {
    base = base.filter(p => p.rating === 'A+' || p.co2 < 0.5);
  }
  filteredProducts = base.filter(p =>
    p.price <= filters.priceMax &&
    p.co2 <= filters.co2Max &&
    filters.materials.includes(p.material) &&
    filters.ratings.includes(p.rating) &&
    (filters.category === 'All' || p.category === filters.category) &&
    (!filters.search || p.name.toLowerCase().includes(filters.search.toLowerCase()) ||
     p.category.toLowerCase().includes(filters.search.toLowerCase()) ||
     p.material.toLowerCase().includes(filters.search.toLowerCase()))
  ).sort((a,b) => a.co2 - b.co2);
  displayedCount = 0;
  renderProducts(false);
  saveFilters();
}

function onPriceChange(el, prefix) {
  filters.priceMax = parseInt(el.value);
  const pct = ((filters.priceMax - 100) / (5000 - 100)) * 100;
  el.style.setProperty('--pct', pct + '%');
  document.querySelectorAll('[id$="-price-val"]').forEach(v => v.textContent = `₹${parseInt(filters.priceMax).toLocaleString('en-IN')}`);
  document.querySelectorAll('[id$="-price"]').forEach(r => { r.value = filters.priceMax; });
  applyFilters();
}

function onCo2Change(el, prefix) {
  filters.co2Max = parseFloat(el.value);
  const pct = (filters.co2Max / 10) * 100;
  el.style.setProperty('--pct', pct + '%');
  document.querySelectorAll('[id$="-co2-val"]').forEach(v => v.textContent = `${filters.co2Max} kg`);
  document.querySelectorAll('[id$="-co2"]').forEach(r => r.value = filters.co2Max);
  applyFilters();
}

function onMaterialChange() {
  filters.materials = [...document.querySelectorAll('[data-material]:checked')].map(c => c.dataset.material);
  applyFilters();
}

function onRatingToggle(rating) {
  if (filters.ratings.includes(rating)) {
    if (filters.ratings.length > 1) filters.ratings = filters.ratings.filter(r => r !== rating);
  } else {
    filters.ratings.push(rating);
  }
  // Update button states
  document.querySelectorAll('.eco-rating-btn').forEach(btn => {
    btn.classList.toggle('active', filters.ratings.includes(btn.textContent.trim()));
  });
  applyFilters();
}

function onCategoryChange(el) {
  filters.category = el.value;
  document.querySelectorAll('.filter-select').forEach(s => s.value = filters.category);
  applyFilters();
}

function resetFilters() {
  filters = { search:'', priceMax:5000, co2Max:10, materials:[...MATERIALS], category:'All', ratings:["A+","A","B"], tab: filters.tab };
  const sb = document.getElementById('sidebar');
  if (sb) sb.innerHTML = buildFilterContent('sidebar');
  const mf = document.getElementById('mobile-filters');
  if (mf) mf.innerHTML = buildFilterContent('mobile');
  const si = document.getElementById('search-input');
  if (si) si.value = '';
  bindFilterEvents();
  applyFilters();
  showToast('Filters reset ✓');
}

/* ===================== SEARCH ===================== */
function bindSearchInput() {
  const si = document.getElementById('search-input');
  if (!si) return;
  si.addEventListener('input', () => {
    filters.search = si.value.trim();
    applyFilters();
  });
}

/* ===================== SLIDER ===================== */
function startSlider() {
  sliderTimer = setInterval(() => slideBy(1), 3200);
}

function slideBy(dir) {
  const track = document.getElementById('slider-track');
  if (!track) return;
  const cards = track.querySelectorAll('.slider-card');
  const total = cards.length;
  const visible = window.innerWidth < 640 ? 2 : window.innerWidth < 1024 ? 3 : 5;
  const maxIndex = Math.max(0, total - visible);
  sliderIndex = Math.max(0, Math.min(sliderIndex + dir, maxIndex));
  if (sliderIndex >= maxIndex && dir > 0) sliderIndex = 0;
  const cardW = cards[0] ? cards[0].offsetWidth + 15 : 0;
  track.style.transform = `translateX(-${sliderIndex * cardW}px)`;
}

/* ===================== MODAL ===================== */
function openModal(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  const overlay = document.getElementById('modal-overlay');
  const box = document.getElementById('modal-box');
  const ratingInfo = {
    'A+': 'Exceptional — lowest possible environmental footprint.',
    'A': 'Excellent — significantly below average emissions.',
    'B': 'Good — better than most conventional alternatives.'
  };
  const co2Pct = Math.min((p.co2 / 5) * 100, 100);
  const co2Color = p.co2 < 1 ? '#4CAF50' : p.co2 < 2.5 ? '#8BC34A' : '#FF9800';
  box.innerHTML = `
    <div style="position:relative">
      <img class="modal-img" src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'">
      ${p.topPick ? '<div class="top-pick-badge" style="position:absolute;top:.75rem;left:.75rem">⭐ Top Pick</div>' : ''}
    </div>
    <div class="modal-body">
      <div class="modal-cat">${p.category} • ${p.material.toUpperCase()}</div>
      <div class="modal-name">${p.name}</div>
      <div class="modal-price">₹${p.price.toLocaleString('en-IN')}</div>
      <div class="modal-row">
        <div class="modal-chip"><span class="modal-chip-l">Rating</span><span class="modal-chip-v" style="color:var(--c-primary)">${p.rating}</span></div>
        <div class="modal-chip"><span class="modal-chip-l">CO₂ Impact</span><span class="modal-chip-v">${p.co2} kg</span></div>
        <div class="modal-chip"><span class="modal-chip-l">Material</span><span class="modal-chip-v" style="text-transform:capitalize">${p.material}</span></div>
        <div class="modal-chip"><span class="modal-chip-l">Category</span><span class="modal-chip-v">${p.category}</span></div>
      </div>
      <div class="modal-co2-visual">
        <div class="modal-co2-label"><span>Footprint vs. conventional 5 kg baseline:</span><span>${p.co2} / 5 kg</span></div>
        <div class="modal-co2-track"><div class="modal-co2-fill" style="width:0%;background:${co2Color}" id="modal-co2-fill"></div></div>
      </div>
      <div class="modal-eco-explanation">
        🌍 <strong>${ratingInfo[p.rating]}</strong> Made from <em>${p.material}</em>, which has a significantly lower environmental impact compared to conventional materials.
      </div>
      <div class="modal-actions">
        <button class="btn-modal-cart" onclick="addToCart(${p.id});closeModal()">🛒 Add to Cart</button>
        <button class="btn-modal-continue" onclick="closeModal()">Continue Shopping</button>
      </div>
    </div>`;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const fill = document.getElementById('modal-co2-fill');
      if (fill) fill.style.width = co2Pct + '%';
    });
  });
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  if (overlay) overlay.classList.remove('open');
  document.body.style.overflow = '';
}

/* ===================== INFINITE SCROLL ===================== */
function handleScroll() {
  if (window.scrollY + window.innerHeight >= document.body.offsetHeight - 250) {
    if (displayedCount < filteredProducts.length) {
      const spinner = document.getElementById('load-spinner');
      if (spinner) spinner.style.display = 'block';
      setTimeout(() => {
        renderProducts(true);
        if (spinner) spinner.style.display = 'none';
      }, 500);
    }
  }
}

/* ===================== LOCAL STORAGE ===================== */
function saveFilters() {
  try { localStorage.setItem('gb_filters', JSON.stringify({...filters, tab: undefined})); } catch(e) {}
}

function loadFilters() {
  try {
    const saved = localStorage.getItem('gb_filters');
    if (saved) {
      const f = JSON.parse(saved);
      filters = { ...filters, ...f };
      if (!filters.materials || !filters.materials.length) filters.materials = [...MATERIALS];
      if (!filters.ratings || !filters.ratings.length) filters.ratings = ["A+","A","B"];
    }
  } catch(e) {}
}

/* ===================== DARK MODE ===================== */
function toggleDark() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
  const btn = document.getElementById('dark-toggle');
  if (btn) btn.textContent = isDark ? '🌙' : '☀️';
  try { localStorage.setItem('gb_theme', isDark ? '' : 'dark'); } catch(e) {}
}

/* ===================== MOBILE FILTER ===================== */
function toggleMobileFilter() {
  const mf = document.getElementById('mobile-filters');
  const icon = document.getElementById('filter-toggle-icon');
  if (!mf) return;
  mf.classList.toggle('open');
  if (icon) icon.textContent = mf.classList.contains('open') ? '▲' : '▼';
}

/* ===================== TOAST ===================== */
function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ===================== BIND EVENTS ===================== */
function bindFilterEvents() {
  document.querySelectorAll('[id$="-price"]').forEach(r => {
    const pct = ((filters.priceMax - 100) / (5000 - 100)) * 100;
    r.style.setProperty('--pct', pct + '%');
  });
  document.querySelectorAll('[id$="-co2"]').forEach(r => {
    const pct = (filters.co2Max / 10) * 100;
    r.style.setProperty('--pct', pct + '%');
  });
}

function bindEvents() {
  bindSearchInput();
  bindFilterEvents();

  const darkBtn = document.getElementById('dark-toggle');
  if (darkBtn) darkBtn.addEventListener('click', toggleDark);

  const overlay = document.getElementById('modal-overlay');
  if (overlay) overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  const closeBtn = document.getElementById('modal-close-btn');
  if (closeBtn) closeBtn.addEventListener('click', closeModal);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeCart(); }
  });

  window.addEventListener('scroll', handleScroll, { passive: true });

  startSlider();
  const sliderWrap = document.querySelector('.slider-wrap');
  if (sliderWrap) {
    sliderWrap.addEventListener('mouseenter', () => clearInterval(sliderTimer));
    sliderWrap.addEventListener('mouseleave', startSlider);
  }
}

/* ===================== INIT ===================== */
function init() {
  loadFilters();
  loadCart();

  try {
    const savedTheme = localStorage.getItem('gb_theme');
    if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  } catch(e) {}

  createDOM();
  applyFilters();
  bindEvents();
  updateHeroCo2();
  updateCartBadge();
  renderCartItems();

  try {
    const savedTheme = localStorage.getItem('gb_theme');
    const btn = document.getElementById('dark-toggle');
    if (btn && savedTheme === 'dark') btn.textContent = '☀️';
  } catch(e) {}
}

init();
</script>
</body>
</html>
